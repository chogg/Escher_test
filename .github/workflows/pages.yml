name: Deploy to GitHub Pages

# Publishes the static site (index.html at repo root) to GitHub Pages.
#
# One-time setup is required because enabling Pages needs repo-admin rights that
# the Actions token does not have by default. Either:
#   A) Settings -> Pages -> Source: "Deploy from a branch" -> this branch, /(root).
#      (Simplest — does not use this workflow at all.)
#   B) Settings -> Pages -> Source: "GitHub Actions", then run this workflow
#      (Actions tab -> "Deploy to GitHub Pages" -> Run workflow), or push to main.
#
# Triggered manually / on main only, so feature-branch pushes don't spam failed
# runs while Pages is still disabled.
on:
  workflow_dispatch:
  push:
    branches: ["main"]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: node tools/stamp.js          # content-fingerprint asset URLs + stamp build version
      - uses: actions/configure-pages@v5
        with:
          enablement: true
      - uses: actions/upload-pages-artifact@v3
        with:
          path: "."

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
